<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostics • Marshal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            max-width: 650px;
            margin: 10% auto;
            padding: 20px;
            font-family: ui-monospace, SFMono-Regular, monospace;
            line-height: 1.6;
            color: #222;
        }

        @media (prefers-color-scheme: dark) {
            body { background: #000; color: #aaa; }
            a { color: #eee; }
            h1, .value { color: #eee; }
            hr { border-color: #222; }
        }

        h1 { font-size: 1.1rem; margin-bottom: 20px; }
        h2 { font-size: 0.9rem; margin-top: 40px; text-transform: uppercase; color: #666; }
        .stat-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #333;
            padding: 5px 0;
        }
        .label { opacity: 0.6; }
        .value { font-weight: bold; }

        canvas {
            margin-top: 20px;
            max-height: 150px;
        }

        .links { margin-top: 40px; font-size: 0.8rem; }
        .links a { text-decoration: none; margin-right: 15px; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <h1>SYSTEM STATISTICS</h1>
        <p style="font-size: 0.85rem;">Live Server telemetry // v4.0</p>
    </header>

    <main>
        <section>
            <div class="stat-row">
                <span class="label">Host</span>
                <span id="system" class="value">connecting...</span>
            </div>
            <div class="stat-row">
                <span class="label">CPU Load</span>
                <span id="cpu" class="value">0%</span>
            </div>
            <div class="stat-row">
                <span class="label">Memory</span>
                <span id="ram" class="value">0%</span>
            </div>
            <div class="stat-row">
                <span class="label">Uptime</span>
                <span id="uptime" class="value">--:--</span>
            </div>
        </section>

        <section>
            <h2>Storage Volumes</h2>
            <div id="disks" style="font-size: 0.9rem;">
            </div>
        </section>

        <section>
            <h2>CPU History</h2>
            <canvas id="cpuChart"></canvas>
        </section>

        <section>
            <h2>Network Traffic</h2>
            <canvas id="netChart"></canvas>
        </section>

        <div class="links">
            <a href="/">[ Home ]</a>
            <a href="/about">[ About ]</a>
            <a href="/labs">[ Labs ]</a>
        </div>
    </main>

    <script src="/static/js/stats.js"></script>
</body>
</html>
