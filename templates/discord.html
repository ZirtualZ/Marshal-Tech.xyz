<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marshal-Tech // Discord</title>
<link rel="stylesheet" href="/static/css/index.css">
<link rel="stylesheet" href="/static/css/discord.css"> <!--This CSS was not entirely made my Marshal-Tech. Mulitple sources and ai refined -->
</head>

<body>
<button id="darkModeToggle" style="position:fixed;top:20px;right:20px;z-index:999;">Dark</button>

<div id="void"></div>

<div class="container">

<div class="logo">MT</div>

<h1>Marshal-Tech</h1>
<div class="subtitle">Community • Linux • Tech</div>

<a href="https://discord.gg/nTdZ9jGjPF" class="join" target="_blank" rel="noopener">
Join Discord
</a>

<div class="links">
<a href="/">← Back</a>
</div>

</div>

<script>
const voidContainer=document.getElementById("void");
for(let i=0;i<30;i++){
const p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(Math.random()*20+10)+"s";
voidContainer.appendChild(p);
}
</script>

<script>
const darkModeKey = 'darkMode';
const darkBtn = document.getElementById('darkModeToggle');
if (localStorage.getItem(darkModeKey) === 'true') {
    document.body.classList.add('dark-mode');
}
if (darkBtn) {
    darkBtn.textContent = document.body.classList.contains('dark-mode') ? 'Light' : 'Dark';
    darkBtn.onclick = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        darkBtn.textContent = isDark ? 'Light' : 'Dark';
        localStorage.setItem(darkModeKey, isDark);
    };
}
</script>
</body>
</html>
