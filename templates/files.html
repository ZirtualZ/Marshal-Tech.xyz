<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marshal | Files</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <!-- bleh im gonna add this to index.css later i think-->
    <style>
        .file-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .file-card { border: 1px solid #444; padding: 10px; width: 200px; text-align: center; }
        .preview { max-width: 100%; height: 120px; object-fit: contain; display: block; margin: 0 auto 10px; }
        .file-link { font-size: 0.8rem; word-break: break-all; }
    </style>
</head>
<body>
    <h1>/files</h1>
    <p class="desc">Random pngs and stuff</p>

    <div class="file-grid">
        {% for file in files %}
        <div class="file-card">
            <!-- preview for these file types -->
            {% if file.lower().endswith(('.gif', '.png', '.jpg', '.jpeg', '.webp')) %}
                <img src="/files/{{ file }}" class="preview" alt="{{ file }}">
            {% else %}
                <div class="preview" style="display: flex; align-items: center; justify-content: center; background: #222;">
                    📄
                </div>
            {% endif %}
            
            <div class="file-link">
                <a href="/files/{{ file }}">{{ file }}</a>
            </div>
        </div>
        {% endfor %}
    </div>

    <hr>
    <div class="links">
        <a href="/">Back Home</a> · <a href="/contact">Contact</a>
    </div>
</body>
</html>
