<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact • Marshal-Tech</title>
    <link rel="stylesheet" href="/static/css/index.css">
</head>
<body>
<button id="darkModeToggle" style="position:fixed;top:20px;right:20px;z-index:999;">Dark</button>
    <div class="container">
        <header>
            <h1>CONTACT</h1>
            <p style="opacity: 0.6;">System Transmission Protocol</p>
        </header>

        <main>
            <div class="panel">
                <form id="contactForm">
                    <div class="form-group">
                        <label>IDENTIFIER</label>
                        <input type="text" name="name" placeholder="Name / Handle" required>
                    </div>

                    <div class="form-group">
                        <label>RETURN_PATH</label>
                        <input type="email" name="email" placeholder="email@domain.com">
                    </div>

                    <div class="form-group">
                        <label>DATA_PAYLOAD</label>
                        <textarea name="message" placeholder="Enter message contents..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">EXECUTE SEND</button>
                </form>
                <div id="feedback">TRANSMISSION SUCCESSFUL.</div>
            </div>

            <div class="panel">
                <label>ALTERNATIVE_CHANNELS</label>
                <div class="social-links">
                    <a href="https://github.com/ZirtualZ">GitHub</a>
                    <a href="https://discord.gg/nTdZ9jGjPF">Discord</a>
                </div>
            </div>

            <p style="text-align: center;">
                <a href="/" style="color: inherit; text-decoration: none; font-size: 0.8rem; opacity: 0.5;">[ Back to Terminal ]</a>
            </p>
        </main>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const feedback = document.getElementById('feedback');
        const btn = document.getElementById('submitBtn');

        form.onsubmit = (e) => {
            e.preventDefault(); // Stop page reload

            btn.innerText = "SENDING...";
            btn.disabled = true;

            // Simulating a form submission
            setTimeout(() => {
                form.style.display = "none";
                feedback.style.display = "block";
            }, 1000);
        };
    </script>

<script>
const darkModeKey = 'darkMode';
const darkBtn = document.getElementById('darkModeToggle');
if (localStorage.getItem(darkModeKey) === 'true') {
    document.body.classList.add('dark-mode');
}
if (darkBtn) {
    darkBtn.textContent = document.body.classList.contains('dark-mode') ? 'Light' : 'Dark';
    darkBtn.onclick = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        darkBtn.textContent = isDark ? 'Light' : 'Dark';
        localStorage.setItem(darkModeKey, isDark);
    };
}
</script>
</body>
</html>
